version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    ignore:
      # Defer major-version bumps of build/lint tooling — they routinely break
      # @iobroker/adapter-dev / eslint-config / ts-node and need manual migration.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@iobroker/eslint-config"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      # The ioBroker testing actions are pinned to floating major tags (@v1) that
      # track upstream automatically; defer disruptive major (@v1 -> @v2) bumps so
      # the published-and-working OIDC deploy job is never changed unattended.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
