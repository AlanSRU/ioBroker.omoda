version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    ignore:
      # Defer major-version bumps of build/lint tooling — they routinely break
      # @iobroker/adapter-dev / eslint-config / ts-node and need manual migration.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@iobroker/eslint-config"
        update-types: ["version-update:semver-major"]
  # No github-actions ecosystem: the ioBroker workflows pin floating major tags
  # (e.g. ioBroker/testing-action-check@v1) which track upstream automatically,
  # so dependabot would only ever propose disruptive major (@v1 -> @v2) bumps.
